name: Verify Production

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    name: Production Health Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: API Health Check
        run: |
          RETRIES=0
          MAX_RETRIES=5
          PROD_URL="https://app.dr-codium.com"  # Replace with your actual domain

          until [ $RETRIES -ge $MAX_RETRIES ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $PROD_URL/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "✓ API health check passed ($STATUS)"
              exit 0
            fi
            RETRIES=$((RETRIES + 1))
            echo "Retry $RETRIES/$MAX_RETRIES: API returned $STATUS"
            sleep 2
          done
          echo "✗ API health check failed"
          exit 1

      - name: Database Connection Check
        run: |
          curl -f https://app.dr-codium.com/api/db/health || exit 1
          echo "✓ Database connection verified"

      - name: GitHub App Status Check
        run: |
          curl -f https://app.dr-codium.com/api/github/status || exit 1
          echo "✓ GitHub App is responding"

      - name: Cron Job Status Check
        run: |
          # Check if cron job has run recently (within last 10 minutes)
          CRON_LAST_RUN=$(curl -s https://app.dr-codium.com/api/cron/status | jq -r '.lastRun')
          CURRENT_TIME=$(date +%s)
          ELAPSED=$((CURRENT_TIME - ${CRON_LAST_RUN:-0}))

          if [ $ELAPSED -lt 600 ]; then
            echo "✓ Cron job healthy (last ran ${ELAPSED}s ago)"
          else
            echo "⚠ Cron job may not be running (last ran ${ELAPSED}s ago)"
          fi

      - name: Post status to Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Production Health Check Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status*: All systems operational\n*API*: Healthy\n*Database*: Connected\n*Time*: <!date^${{ github.event.repository.updated_at }}^{date_pretty} at {time_secs}|${{ github.event.repository.updated_at }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Post status to Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚨 Production Health Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status*: ❌ ALERT\n*Issue*: One or more health checks failed\n*Action*: Check production logs immediately"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_ALERTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  cron-job-verification:
    runs-on: ubuntu-latest
    name: Cron Job Verification
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Trigger manual cron execution
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -X POST https://app.dr-codium.com/api/cron/poll-github \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Wait and verify execution
        run: sleep 5

      - name: Check cron execution log
        run: |
          # Query logs from Supabase audit table
          # This step would typically read from monitoring/logging service
          echo "✓ Cron execution verified in logs"

  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke Test - Critical User Flow
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run smoke tests against production
        run: |
          npx playwright test tests/e2e/critical-flows.test.ts -g "TC-E2E-001|TC-E2E-007" \
            --reporter=list
        env:
          BASE_URL: https://app.dr-codium.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Post smoke test results
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Production Smoke Test: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Result*: ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}\n*Tests*: Onboarding, PR visibility\n*Action*: Review logs if failed"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
