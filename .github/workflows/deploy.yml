name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test before deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Vercel Production
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@v6
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          production: true
        id: vercel

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          RETRIES=0
          MAX_RETRIES=30
          until [ $RETRIES -ge $MAX_RETRIES ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.vercel.outputs.preview-url }}/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "✓ API health check passed"
              exit 0
            fi
            RETRIES=$((RETRIES + 1))
            echo "Waiting for API to be healthy (attempt $RETRIES/$MAX_RETRIES)..."
            sleep 2
          done
          echo "✗ API health check failed"
          exit 1

      - name: Verify Supabase connection
        run: |
          curl -f ${{ steps.vercel.outputs.preview-url }}/api/db/health || exit 1
          echo "✓ Database connection verified"

      - name: Post deployment to Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Dr Codium Production Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deploy Status*: ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}\n*URL*: ${{ steps.vercel.outputs.preview-url }}\n*Commit*: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
