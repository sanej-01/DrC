name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      # npm install (not ci): the lock file is generated on Windows and npm
      # omits some platform-optional entries the Linux runner needs, which
      # makes npm ci fail with EUSAGE.
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint
